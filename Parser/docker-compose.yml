services:
  parser-webhook:
    build: .
    container_name: parser-service
    ports: 
      # Port mapping
      - "8000:8000"
    volumes:
      - ./:/app:z
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - foxvault_network

networks:
  foxvault_network:
    external: true