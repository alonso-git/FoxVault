services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=ExplodingKitten
      - POSTGRES_DB=db_finance
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  core-api: 
    build: .
    container_name: core-service
    environment:
      - DB_URL=postgresql://admin:ExplodingKitten@postgres-db:5432/db_finance
    ports:
      - "8001:8000"
    depends_on:
      - postgres-db
    volumes:
      - ./:/app:z
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres-data: